name: Lotto Data Auto Sync

on:
  schedule:
    # 토요일 밤 8시 45분부터 11시까지 15분 간격으로 실행 (UTC 기준 11:45 ~ 14:00)
    - cron: '45,0,15,30,45 * * * 6'
  workflow_dispatch: # 수동 실행 허용

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Update Script
        run: python update_latest.py

      - name: Check for Changes
        id: git-check
        run: |
          git config --global user.name 'LottoSync Bot'
          git config --global user.email 'bot@lottocore.ai'
          git add .
          git status
          echo "changed=$(git diff --staged --name-only | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.git-check.outputs.changed > 0
        run: |
          git commit -m "data: Auto-update latest lotto results and statistics"
          git push origin main
