<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연금복권 720+ 역대 당첨 히스토리</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

</head>
<body class="analysis-page">
    <header class="sticky-header">
        <div class="header-inner">
            <div class="header-top-row">
                <h1>🎟️ 연금복권 720+</h1>
                <div class="nav-links">
                    <div class="site-switcher">
                        <a href="index.html" class="switcher-btn lotto">🍀 로또 6/45</a>
                        <a href="pension_main.html" class="switcher-btn pension active">🎟️ 연금 720+</a>
                    </div>
                    <a href="pension_main.html" class="nav-btn small pension-theme">🔮 AI 분석</a>
                    <a href="pension_analysis.html" class="nav-btn small pension-theme">📊 통계분석</a>
                    <a href="pension_combination.html" class="nav-btn small pension-theme">🎯 조합분석</a>
                    <a href="pension.html" class="nav-btn small pension-theme active">📋 히스토리</a>
                    <a href="pension_guide.html" class="nav-btn small pension-theme">📖 가이드</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container wide">
        <p class="subtitle">연금복권 720+의 역대 당첨 번호와 패턴을 분석합니다</p>

        <section class="analysis-card">
            <div class="card-header">
                <h3>📋 역대 당첨 내역</h3>
            </div>
            <div class="table-responsive">
                <table class="results-table expert-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">회차</th>
                            <th style="width: 60px;">조</th>
                            <th>당첨 번호</th>
                            <th style="width: 120px;">추첨일</th>
                        </tr>
                    </thead>
                    <tbody id="pension-history-body">
                        <!-- JS에서 데이터 로드 -->
                        <tr>
                            <td colspan="4" class="placeholder">데이터를 불러오는 중입니다...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="standard-footer">
            <p class="disclaimer">※ 본 데이터는 공공데이터 및 역대 당첨 결과를 바탕으로 제공됩니다.</p>
        </footer>
    </div>

    <style>
        .pension-ball {
            display: inline-flex;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f1f3f5;
            color: #495057;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            font-size: 1.1rem;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1);
        }
        .pension-ball.group {
            background: var(--primary-blue);
            color: white;
            margin-right: 15px;
            position: relative;
        }
        .pension-ball.group::after {
            content: "조";
            position: absolute;
            right: -18px;
            color: var(--text-main);
            font-size: 0.85rem;
        }
        .expert-table td {
            padding: 15px 10px;
            font-size: 0.95rem;
        }
        .draw-no {
            font-weight: 900;
            color: var(--primary-blue);
        }
    </style>

    <script src="core.js"></script>
    <script src="pension.js"></script>
    <script src="consent.js"></script>

</html>
