<body class="analysis-page">
    <header class="sticky-header">

                <h1 style="color: #ff8c00;">📋 연금 히스토리</h1>
                <div class="nav-links">

                    <a href="pension_main.html" class="nav-btn small pension-theme">🔮 AI 분석</a>
                    <a href="pension_analysis.html" class="nav-btn small pension-theme">📊 통계분석</a>

    <div class="container wide">
        <p class="subtitle">연금복권의 자리수별 흐름을 한눈에 파악할 수 있는 전문가용 데이터 시트입니다</p>

        <!-- 전문가용 히스토리 표 -->
        <section class="analysis-card" style="padding: 0; overflow: hidden;">
            <div class="card-header" style="padding: 20px;">
                <h3>📊 역대 당첨 번호 데이터 시트</h3>
                <span class="status-badge safe">실시간 동기화 완료</span>
            </div>
            
            <div class="table-container expert-mode" style="overflow-x: auto; max-height: 700px;">
                <table class="expert-table" id="pension-history-table">
                    <thead>
                        <tr>
                            <th class="sticky-col first">회차</th>
                            <th class="sticky-col second">조</th>
                            <th><div class="slanted">1위(십만)</div></th>
                            <th><div class="slanted">2위(만)</div></th>
                            <th><div class="slanted">3위(천)</div></th>

                            <th><div class="slanted">5위(십)</div></th>
                            <th><div class="slanted">6위(일)</div></th>
                            <th>합계</th>
                            <th>홀짝</th>
                            <th>패턴</th>
                        </tr>
                    </thead>
                    <tbody id="pension-history-body">
                        <!-- JS에서 데이터 로드 -->
                    </tbody>

            </div>

        <footer class="standard-footer">
